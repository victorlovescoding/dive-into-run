name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
  NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Activate pinned npm via corepack
        run: corepack enable && corepack prepare npm@10.9.4 --activate

      - run: npm ci
      - name: Install Linux native bindings
        run: >-
          npm install --no-save
          @rollup/rollup-linux-x64-gnu
          @tailwindcss/oxide-linux-x64-gnu
          lightningcss-linux-x64-gnu
          || true

      - name: Lint
        run: npm run lint -- --max-warnings 0

      - name: Flaky pattern audit
        run: npm run audit:flaky-patterns

      - name: Type check
        run: npm run type-check

      - name: Dependency cruiser
        run: npm run depcruise

      - name: Spellcheck
        run: npm run spellcheck

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Unit & integration tests (with coverage)
        run: firebase emulators:exec --only auth,firestore --project=demo-test "npx vitest run --coverage"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build
        run: npm run build

  e2e:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Activate pinned npm via corepack
        run: corepack enable && corepack prepare npm@10.9.4 --activate

      - run: npm ci
      # Workaround: npm bug #4828 — macOS lock file misses Linux native bindings
      - name: Install Linux native bindings
        run: >-
          npm install --no-save
          @rollup/rollup-linux-x64-gnu
          @tailwindcss/oxide-linux-x64-gnu
          lightningcss-linux-x64-gnu
          || true

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Run all E2E tests
        run: bash scripts/run-all-e2e.sh
        env:
          CI: 'true'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
