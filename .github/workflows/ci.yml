name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
  NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Activate pinned npm via corepack
        run: corepack enable && corepack prepare npm@10.9.4 --activate

      - run: npm ci
      - name: Install Linux native bindings
        run: >-
          npm install --no-save
          @rollup/rollup-linux-x64-gnu
          @tailwindcss/oxide-linux-x64-gnu
          lightningcss-linux-x64-gnu
          || true

      - name: Doc freshness
        run: npm run doc:freshness

      - name: Workflow links check
        run: npm run workflow:links

      - name: Lint
        run: npm run lint -- --max-warnings 0

      - name: useEffect data fetching audit
        run: npm run audit:use-effect-data-fetching

      - name: Type check
        run: npm run type-check

      - name: Dependency cruiser
        run: npm run depcruise

      - name: Spellcheck
        run: npm run spellcheck

      - name: Build
        run: npm run build
