name: Quality Budgets

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
  NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

jobs:
  report:
    name: Report-only quality budgets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Activate pinned npm via corepack
        run: corepack enable && corepack prepare npm@10.9.4 --activate

      - run: npm ci

      - name: Install Linux native bindings
        run: >-
          npm install --no-save
          @rollup/rollup-linux-x64-gnu
          @tailwindcss/oxide-linux-x64-gnu
          lightningcss-linux-x64-gnu
          || true

      - name: Knip report
        run: npm run knip:report
        continue-on-error: true

      - name: Knip production dependency report
        run: npm run knip:production-deps
        continue-on-error: true

      - name: Strict TypeScript/JSDoc report
        run: npm run type-check:strict-report
        continue-on-error: true

      - name: Next bundle budget report
        run: npm run build:budget
        env:
          # Public Firebase fallbacks keep pull_request reports usable when secrets are unavailable.
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'quality-budget-api-key' }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || 'quality-budget.firebaseapp.com' }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || 'quality-budget' }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET || 'quality-budget.appspot.com' }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID || '000000000000' }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID || '1:000000000000:web:qualitybudget' }}
          BUNDLE_BUDGET_FIRST_LOAD_KB: '270'
          BUNDLE_BUDGET_ROUTE_SIZE_KB: '64'
        continue-on-error: true

      - name: Next bundle analyzer report
        run: npm run build:analyze
        continue-on-error: true

      - name: Lighthouse CI report
        run: npm run lhci:report
        continue-on-error: true

      - name: Quality baseline summary
        if: ${{ always() }}
        run: npm run quality:baseline-summary
        continue-on-error: true

      - name: Knip production unlisted-deps gate
        run: npm run knip:production-unlisted-deps

      - name: Upload quality reports
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: quality-budget-reports
          path: |
            knip-report.json
            .next/analyze/
            reports/bundle-budget/
            reports/type-check-strict/
            reports/quality-baselines/
            lhci-report/
          if-no-files-found: ignore
          retention-days: 14
